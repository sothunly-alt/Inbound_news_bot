name: Telegram Notification Bot

on: [push, pull_request]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Parse GitHub Event and Notify Telegram
        env:
          # Different bot from the news bot — set in repo Secrets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Same channel as the news bot
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # New topic/thread for CI notifications
          TELEGRAM_NOTIFY_THREAD_ID: ${{ secrets.TELEGRAM_NOTIFY_THREAD_ID }}
        shell: python
        run: |
          import html
          import os
          import json
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone, timedelta

          token = os.environ.get("TELEGRAM_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHANNEL_ID")
          thread_id = os.environ.get("TELEGRAM_NOTIFY_THREAD_ID")
          event_path = os.environ.get("GITHUB_EVENT_PATH")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")

          if not token or not chat_id or not event_path:
              print("Error: Missing TELEGRAM_TOKEN, TELEGRAM_CHANNEL_ID, or GITHUB_EVENT_PATH.")
              raise SystemExit(1)

          with open(event_path, "r", encoding="utf-8") as f:
              payload = json.load(f)

          cambodia_tz = timezone(timedelta(hours=7))
          commit_time = datetime.now(cambodia_tz).strftime("%H:%M:%S")
          repo_name = payload.get("repository", {}).get("name", "Unknown Repo")
          repo_url = payload.get("repository", {}).get("html_url", "")

          def esc(value: object) -> str:
              return html.escape(str(value), quote=False)

          button_text = "Open repo"
          button_url = repo_url

          if event_name == "pull_request":
              pr = payload.get("pull_request", {})
              action = payload.get("action", "updated")
              number = pr.get("number", "?")
              title = pr.get("title", "No title")
              author = (pr.get("user") or {}).get("login", "Someone")
              base = (pr.get("base") or {}).get("ref", "?")
              head = (pr.get("head") or {}).get("ref", "?")
              pr_url = pr.get("html_url", "") or repo_url

              message = f"<b>PR {esc(action)} — {esc(repo_name)}</b>\n\n"
              message += f"Branch: {esc(head)} → {esc(base)}\n"
              message += f"By: {esc(author)}\n\n"
              message += f"#{esc(number)}: {esc(title)}\n"
              message += f"\nTime: {esc(commit_time)}"
              button_text = "Open PR"
              button_url = pr_url
          else:
              pusher = payload.get("pusher", {}).get("name", "Someone")
              ref = payload.get("ref", "refs/heads/main").split("/")[-1]
              compare_url = payload.get("compare") or repo_url

              message = f"<b>New push to {esc(repo_name)}</b>\n\n"
              message += f"Branch: {esc(ref)}\n"
              message += f"By: {esc(pusher)}\n\n"
              message += "Commits:\n"

              commits = payload.get("commits", [])[:5]
              if not commits:
                  message += "• (no commit details in payload)\n"
              for commit in commits:
                  msg = commit.get("message", "No message").split("\n")[0]
                  author = commit.get("author", {}).get("name", "Unknown")
                  message += f"• {esc(msg)} (- {esc(author)})\n"

              message += f"\nTime: {esc(commit_time)}"
              button_text = "Compare" if payload.get("compare") else "Open repo"
              button_url = compare_url

          if not button_url:
              print("Error: No URL available for inline button.")
              raise SystemExit(1)

          api_url = f"https://api.telegram.org/bot{token}/sendMessage"
          body = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
              "reply_markup": {
                  "inline_keyboard": [[
                      {"text": button_text, "url": button_url}
                  ]]
              },
          }
          if thread_id:
              body["message_thread_id"] = int(thread_id)

          req = urllib.request.Request(
              api_url,
              data=json.dumps(body).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as response:
                  print("Success! Notification delivered to Telegram.")
                  print(response.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              print(f"Failed to transmit message: {e}")
              print(e.read().decode("utf-8", errors="replace"))
              raise SystemExit(1)
          except Exception as e:
              print(f"Failed to transmit message: {e}")
              raise SystemExit(1)
